<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="keywords" content="">
  <meta property="og:type" content="website">
  <title>Loading...</title>
  <link rel="icon" type="image/svg+xml" id="favicon" href="">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-outline" id="cursorOutline"></div>
  <div class="loader" id="loader"><div class="loader-spinner"></div></div>

  <!-- NAVBAR — Glass Floating Pill -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="#home" class="brand-logo"></a>
      <ul class="nav-links" id="navLinks"></ul>
      <a href="#" class="nav-reserve" id="nav-reserve-btn">
        <i class="fas fa-calendar-check"></i> احجز طاولتك
      </a>
      <button class="mobile-menu-toggle" id="mobileMenu" style="display:none">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="home">
    <div class="hero-content">
      <div class="hero-tag fade-in"></div>
      <h1 class="hero-title fade-in"></h1>
      <p class="tagline hero-tagline fade-in"></p>
      <p class="hero-description fade-in"></p>
      <div class="hero-buttons fade-in"></div>
    </div>
  </section>

  <!-- TICKER -->
  <div class="cp-ticker-wrap">
    <div class="cp-ticker" id="cp-ticker"></div>
  </div>

  <!-- STATS -->
  <section class="stats section" id="section-stats">
    <div class="container"><div class="stats-grid"></div></div>
  </section>

  <!-- FEATURES -->
  <section class="features section" id="section-features">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title fade-in"></h2>
        <p class="section-subtitle fade-in"></p>
      </div>
      <div class="medical-grid"></div>
    </div>
  </section>

  <!-- SERVICES -->
  <section class="services section" id="section-services">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title fade-in"></h2>
        <p class="section-subtitle fade-in"></p>
      </div>
      <div class="services-grid"></div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section class="testimonials section" id="section-testimonials">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title fade-in"></h2>
        <p class="section-subtitle fade-in"></p>
      </div>
      <div class="testimonials-grid"></div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta section" id="section-cta">
    <div class="container">
      <h2 class="cta-title fade-in"></h2>
      <p class="cta-subtitle fade-in"></p>
      <div class="hero-buttons fade-in"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact section" id="section-contact">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title fade-in"></h2>
        <p class="section-subtitle fade-in"></p>
      </div>
      <div class="contact-container">
        <div class="contact-info fade-in">
          <h3>معلومات التواصل</h3>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone"></i></div>
            <div class="contact-details"><h4>الهاتف</h4><p class="contact-phone" dir="ltr"></p></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <div class="contact-details"><h4>البريد</h4><p><a class="contact-email" href="#"></a></p></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
            <div class="contact-details"><h4>واتساب</h4><p><a class="contact-wa" href="#" target="_blank"></a></p></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div class="contact-details"><h4>العنوان</h4><p class="contact-city"></p></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-clock"></i></div>
            <div class="contact-details"><h4>المواعيد</h4><p class="contact-hours"></p></div>
          </div>
        </div>
        <form class="contact-form fade-in" id="contactForm">
          <h3 class="form-title"></h3>
          <div class="form-group"><label>الاسم الكامل</label><input type="text" name="name"></div>
          <div class="form-group"><label>رقم الهاتف</label><input type="tel" name="phone"></div>
          <div class="form-group"><label>نوع الطلب</label>
            <select id="service" name="service"></select>
          </div>
          <div class="form-group"><label>رسالتك</label><textarea name="message"></textarea></div>
          <button type="submit" class="btn btn-primary" style="width:100%"></button>
        </form>
      </div>
    </div>
  </section>

  <!-- WHATSAPP FLOAT -->
  <a href="#" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

  <!-- FOOTER -->
  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3 class="footer-brand-name"></h3>
        <p class="footer-about"></p>
        <div class="social-links">
          <a id="footer-instagram" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
          <a id="footer-twitter"   href="#" target="_blank"><i class="fab fa-twitter"></i></a>
          <a id="footer-tiktok"    href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
          <a id="footer-youtube"   href="#" target="_blank"><i class="fab fa-youtube"></i></a>
          <a id="footer-linkedin"  href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="footer-dynamic-cols"></div>
      <div class="footer-section">
        <h3>تواصل معنا</h3>
        <p><i class="fas fa-phone" style="color:var(--indigo);margin-left:6px"></i> <span class="footer-contact-phone"></span></p>
        <p><i class="fab fa-whatsapp" style="color:var(--green);margin-left:6px"></i> <a class="footer-contact-wa" href="#" style="color:rgba(255,255,255,.4);text-decoration:none"></a></p>
        <p><i class="fas fa-map-marker-alt" style="color:var(--indigo);margin-left:6px"></i> <span class="footer-contact-city"></span></p>
      </div>
    </div>
    <div class="footer-bottom">
      <p class="footer-copyright"></p>
    </div>
  </footer>

  <a href="#home" class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></a>

  <script src="config.js"></script>
  <script>
    // Cursor
    const cd=document.getElementById('cursorDot'),cr=document.getElementById('cursorOutline');
    document.addEventListener('mousemove',e=>{
      cd.style.cssText+=`;left:${e.clientX-4}px;top:${e.clientY-4}px;opacity:1`;
      setTimeout(()=>{cr.style.cssText+=`;left:${e.clientX}px;top:${e.clientY}px;opacity:1`},60);
    });
    document.querySelectorAll('a,button').forEach(el=>{
      el.addEventListener('mouseenter',()=>{cd.classList.add('hover');cr.classList.add('hover')});
      el.addEventListener('mouseleave',()=>{cd.classList.remove('hover');cr.classList.remove('hover')});
    });

    // Nav reserve button
    document.getElementById('nav-reserve-btn').addEventListener('click', e => {
      e.preventDefault();
      const t = document.getElementById('section-contact');
      if(t) { const top=t.getBoundingClientRect().top+window.scrollY-70; window.scrollTo({top,behavior:'smooth'}); }
    });

    // Mobile menu
    document.getElementById('mobileMenu').addEventListener('click',()=>{
      document.getElementById('navLinks').classList.toggle('open');
    });

    // Loader
    window.addEventListener('load',()=>{
      setTimeout(()=>document.getElementById('loader').classList.add('hidden'),600);
    });
  </script>

</body>
</html>
